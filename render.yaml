services:
  # ── Backend API on Render ─────────────────────────────────
  - type: web
    name: streamvault-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false   # Your Vercel frontend URL

  # ── Frontend (deploy separately to Vercel) ────────────────
  # Vercel auto-detects React; just connect your GitHub repo.
  # Set REACT_APP_API_URL = https://streamvault-api.onrender.com/api
